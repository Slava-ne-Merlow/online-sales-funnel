databaseChangeLog:
  - changeSet:
      id: 20-create-project-history-table
      author: codex
      changes:
        - createTable:
            tableName: project_history
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: project_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: old_stage
                  type: VARCHAR(50)
              - column:
                  name: new_stage
                  type: VARCHAR(50)
              - column:
                  name: old_status
                  type: VARCHAR(50)
              - column:
                  name: new_status
                  type: VARCHAR(50)
              - column:
                  name: old_amount
                  type: NUMERIC(19,2)
              - column:
                  name: new_amount
                  type: NUMERIC(19,2)
              - column:
                  name: old_global_comment
                  type: TEXT
              - column:
                  name: new_global_comment
                  type: TEXT
              - column:
                  name: old_source
                  type: VARCHAR(50)
              - column:
                  name: new_source
                  type: VARCHAR(50)
              - column:
                  name: comment
                  type: TEXT
              - column:
                  name: actor_user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: project_history
            baseColumnNames: project_id
            constraintName: fk_project_history_project_id_projects
            referencedTableName: projects
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: project_history
            baseColumnNames: actor_user_id
            constraintName: fk_project_history_actor_user_id_users
            referencedTableName: users
            referencedColumnNames: id
        - createIndex:
            tableName: project_history
            indexName: idx_project_history_project_id
            columns:
              - column:
                  name: project_id
        - createIndex:
            tableName: project_history
            indexName: idx_project_history_created_at
            columns:
              - column:
                  name: created_at
