databaseChangeLog:
  - changeSet:
      id: 18-create-mail-outbox-table
      author: Mstislav_the
      changes:
        - createTable:
            tableName: mail_outbox
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: to_email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: bcc_email
                  type: VARCHAR(255)
              - column:
                  name: subject
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: body
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: attempts
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: next_attempt_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: last_error
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
