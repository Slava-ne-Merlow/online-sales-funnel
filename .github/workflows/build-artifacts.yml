name: Build Air-Gapped Release Bundle

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version used in image tags and artifact names, for example 1.2.3'
        required: true
        type: string
  push:
    tags:
      - 'v*'
      - '*.*.*'

jobs:
  build-images:
    runs-on: ubuntu-latest
    env:
      BACKEND_IMAGE_NAME: online-sales-funnel-backend
      FRONTEND_IMAGE_NAME: online-sales-funnel-frontend
      POSTGRES_IMAGE: postgres:15.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------- Backend ----------
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build backend jar
        working-directory: backend
        run: ./gradlew --no-daemon clean bootJar

      - name: Build backend image
        run: |
          docker build \
            -t ${BACKEND_IMAGE_NAME}:${VERSION} \
            -f backend/Dockerfile \
            backend

      # ---------- Frontend ----------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend image
        run: |
          docker build \
            -t ${FRONTEND_IMAGE_NAME}:${VERSION} \
            -f frontend/Dockerfile \
            frontend

      - name: Pull infra images for offline deployment
        run: |
          docker pull ${POSTGRES_IMAGE}

      - name: Package release bundle
        run: |
          mkdir -p artifacts/release
          docker save \
            ${BACKEND_IMAGE_NAME}:${VERSION} \
            ${FRONTEND_IMAGE_NAME}:${VERSION} \
            ${POSTGRES_IMAGE} \
            -o artifacts/release/images_${VERSION}.tar
          cp docker-compose.yml artifacts/release/docker-compose.yml
          cp DEPLOY-AIRGAP.md artifacts/release/DEPLOY-AIRGAP.md
          cp deploy/.env.example artifacts/release/.env.example
          tar -czf artifacts/airgap-release_${VERSION}.tar.gz -C artifacts/release .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: airgap-release-${{ env.VERSION }}
          path: artifacts/airgap-release_${{ env.VERSION }}.tar.gz
