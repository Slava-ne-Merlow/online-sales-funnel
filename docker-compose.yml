services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:15.6}
    pull_policy: never
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
        test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME} -d ${POSTGRES_DB}" ]
        interval: 10s
        timeout: 3s
        retries: 5

    restart: unless-stopped

  app:
    image: ${BACKEND_IMAGE:-online-sales-funnel-backend}:${APP_VERSION}
    pull_policy: never
    networks:
      - default
    environment:
      SERVER_PORT: 8080
      POSTGRES_JDBC_URL: ${POSTGRES_JDBC_URL}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://127.0.0.1:8080/actuator/health' ]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-online-sales-funnel-frontend}:${APP_VERSION}
    pull_policy: never
    ports:
      - '${FRONTEND_PORT:-13000}:80'
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped


volumes:
  postgres-data:
